1: "Wie und wo haben wir uns kennengelernt?\n\nWelche Erinnerungen verbindest du damit?"
2: "Was ist, deiner Meinung nach, unser schönster gemeinsamer Moment der letzten 6 Monate?"
3: "Mit welcher gemeinsamen Reise oder welchem Ort, den wir zusammen besucht haben, verbindest du besondere Erinnerungen?"
4: "Was ist für dich der witzigste Moment, den wir gemeinsam erlebt haben?"
5: "An welche gemeinsame Anschaffung denkst du gerne zurück und warum?"
6: "Gibt es einen Film, der dich immer an mich oder uns als Paar erinnert?"
7: "Was hat dich an dieser Beziehung am meisten überrascht?"
8: "Was waren, deiner Meinung nach, Hoch- und Tiefpunkt unserer Beziehung?"
9: "An welchem Jahreswechsel mit mir denkst du besonders gerne?"
10: "Was war das Kitschigste, das ich je für dich gemacht habe?"
11: "Was war besonders schön und was war besonders schwierig, als wir zusammengezogen sind?"
12: "Erzähl mir von einer Herausforderung, die wir gemeinsam gemeistert haben.\n\nWie hast du dich in dieser Situation gefühlt?"
13: "Wie hat dein Umfeld auf mich, als deinen neuen Partner, reagiert und wie hast du dich dabei gefühlt?"
14: "Über welches meiner Geschenke hast du dich am meisten gefreut?"
15: "An welchem Punkt hast du realisiert, dass du in mich verliebt bist?"
16: "Wann konnten wir uns vor Lachen kaum noch halten?\n\nWarum?"
17: "Gibt es ein Lied, das dich immer an mich als Person oder uns als Paar erinnert?"
18: "Erinnerst du dich an unseren ersten richtig großen Streit?\n\nWorum ging es?"
19: "Was haben wir in unserer Kennenlernphase unternommen und an welches Date erinnerst du dich noch ganz besonders?"
20: "Wie empfandest du unser erstes \"Ich liebe dich\"?"
