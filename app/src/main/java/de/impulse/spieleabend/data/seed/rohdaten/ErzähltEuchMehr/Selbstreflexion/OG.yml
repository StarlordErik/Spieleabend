1: "Worauf freust du dich momentan ganz besonders?"
2: "Was war dein persönlich größter Erfolg in deinem Leben?"
3: "Wofür bewunderst du andere Menschen?"
4: "Wo möchtest du im Leben stehen, wenn du deinen nächsten runden Geburtstag erreichst?"
5: "Was war dein Berufswunsch als Kind und wie denkst du heute darüber?"
6: "Gibt es etwas, woran du gerade voller Passion arbeitest?"
7: "Was ist dein Lieblingsgeruch und was verbindest du mit ihm?"
8: "Was hast du irgendwann einmal getan, wofür du dich heute ernsthaft schämst?"
9: "Worüber hast du das letzte Mal so sehr gelacht, dass deine Augen anfingen zu tränen?"
10: "Was ist, deiner Meinung nach, der größte Unterschied zwischen uns beiden?"
11: "Welche Entscheidung, die du getroffen hast, hat dein Leben am stärksten beeinflusst?"
12: "Welche Eigenschaft anderer Menschen macht dich wahnsinnig?"
13: "Wofür gibst du gerne Geld aus und schaust auch nicht zwingend auf das Preisschild?"
14: "Wann und in welcher Situation hast du das letzte Mal jemanden oder etwas aufgegeben?"
15: "Was tust du, um dich selbst glücklich zu machen?"
16: "Was tust du regelmäßig und immer wieder, obwohl es dir absolut nicht gefällt?"
17: "Was ist momentan deine größte Herausforderung?"
18: "Welcher Mensch hat dich besonders inspiriert und warum?"
19: "Was ist das Beste daran, du zu sein?"
20: "Was tust du, um andere Menschen glücklich zu machen?"
21: "Was ist dein wichtigstes Ziel für die nächsten 6 Monate?"
22: "Was haben wir deiner Meinung nach gemeinsam?"
23: "Warst du jemals sehr beunruhigt oder ängstlich wegen einer Sache, die sich im Nachgang als halb so wild entpuppte?"
24: "Welches Kompliment ist dir besonders in Erinnerung geblieben?"
25: "Beschreibe, wie ein Buch und ein Film dich besonders beeinflusst haben."
26: "Wann hast du das letzte Mal in Gegenwart einer anderen Person geweint und warum?"
27: "Welches Ereignis oder welche Person hat zuletzt deine Sichtweise auf ein bestimmtes Thema signifikant geändert?"
28: "Was war das Hilfreichste, das du in letzter Zeit gelernt hast?"
29: "Wie sieht dein perfekter Sonntagabend aus?"
30: "Was ist deine aktuell größte Sorge?"
31: "Was war dein stolzester Moment in den letzten 12 Monaten?"
32: "Was verbessert deine Laune schlagartig?"
33: "Beschreibe deine Morgenroutine."
34: "Was bedeutet es für dich ein glückliches Leben zu führen?"
35: "Was denken viele Leute über dich, ist deiner Meinung nach aber nicht zutreffend?"
36: "Erkläre den Einfluss deiner Kinderstube an der Art, wie du ...\n... Urlaub machst.\n... Weihnachten feierst.\n... in den Tag startest."
37: "Wann hast du dir das letzte Mal einen Rat oder eine Meinung eingeholt?\n\nZu wem gehst du in solchen Fällen?"
38: "Wann war dein letzter richtig mieser Tag?\n\nWas ist geschehen?"
39: "Gibt es etwas, von dem du schon lange träumst es zu tun?\n\nWas hielt dich bisher davon ab, es zu tun?"
