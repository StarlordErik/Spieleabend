1: "Du kannst einem Menschen auf dieser Welt einen Herzenswunsch erfüllen.\n\nWem erfüllst du welchen Wunsch?",
2: "Du kannst auf eine persönliche Hygieneroutine verzichten, ohne, dass es sich negativ auswirkt.\n\nWelche Routine wählst du aus?",
3: "Du kannst einen Tag in deinem Leben nochmal leben.\n\nWelchen Tag wählst du aus?",
4: "Du bekommst die Möglichkeit, (noch) einmal zu studieren.\n\nFür welchen Studiengang entscheidest du dich?",
5: "Du kannst für einen Tag die Darstellung des Google Logos bestimmen.\n\nWie würde es aussehen?",
6: "Die Biografie welches deiner Verwandten würdest du am liebsten lesen und warum?",
7: "Du kannst der weltweit führende Experte in einer bestimmten Nische sein.\n\nWelche Nische wählst du?",
8: "Von all deinen Besitztümern darfst du lediglich fünf behalten.\n\nFür welche entscheidest du dich?",
9: "Du hast eine fünfminütige Audienz beim Papst.\n\nWorüber sprichst du mit ihm?",
10: "Du bist sowohl geografisch als auch finanziell unabhängig.\n\nWie und wo lebst du?",
11: "Du findest heraus, dass dein gesamtes Leben ein einziger Traum ist. Du kannst jetzt entscheiden, ob du aufwachst oder in deinem Traum weiterlebst.\n\nWas tust du?",
12: "Du kannst genau einen Umstand an der Art, wie du aufgewachsen bist, ändern.\n\nWofür entscheidest du dich?",
13: "Du kannst deine tägliche Schlafzeit problemlos halbieren.\n\nWofür nutzt du die neu gewonnene Zeit?",
14: "Du bist Bildungsminister und erarbeitest die Schulinhalte für die nächsten Jahre.\n\nWas muss zwingend auf die Lehrpläne?",
15: "Du wirst für eine Woche lang mit einer Superkraft deiner Wahl ausgestattet.\n\nFür welche Superkraft entscheidest du dich?",
16: "Du bekommst 100.000€, um einen Raum in deinem bestehenden Zuhause nach deinen Wünschen umzugestalten.\n\nWelchen Raum wählst du und was änderst du?",
17: "Du bist mit einem seltenen Virus infiziert. Ärzte teilen dir mit, dass du nur noch eine Woche zu leben hast. Du bist mobil und frei beweglich.\n\nWie gestaltest du deine letzte Woche?",
18: "Du reist in die Vergangenheit und hast ein fünfminütiges Gespräch mit deinem zehnjährigen Ich.\n\nWas erzählst du ihm?",
19: "Du hast einen Freifahrtschein in der Schönheitsklinik. Würdest du etwas ändern lassen?\n\nFalls ja, was?",
20: "Du wirst nach deinem Ableben einmalig wiedergeboren und kannst komplett frei bestimmen als was.\n\nWofür entscheidest du dich?",
21: "Unter sämtlichen Menschen dieser Welt darfst du drei zum Abendessen einladen. Sie werden sicher erscheinen.\n\nWen lädst du ein?"
